<!doctype html>
<html lang="en">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="../css/main.css" />

    <script src="../custom-elements/photo-card.js"></script>
    <title>All of Maine</title>
  </head>

  <body class="d-flex flex-column">
    <header class="sticky-top">
      <div class="d-flex justify-content-between align-items-center mb-3 p-2 bg-dark text-white">
        <span class="banner-author">by Neil</span>

        <div class="d-flex gap-2">
          <button id="themeToggle" type="button" class="btn btn-outline-light btn-sm" title="Toggle theme">
            <i class="bi bi-moon-stars"></i>
          </button>
        </div>
      </div>

      <div class="container">
        <div class="card shadow mb-2">
          <div class="card-body pb-0">
            <nav aria-label="breadcrumb">
              <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="../index.html">Home</a></li>
                <li class="breadcrumb-item active">All of Maine</li>
              </ol>
            </nav>
          </div>
        </div>
      </div>
    </header>

    <div class="container flex-grow-1 d-flex flex-column">
      <div class="row flex-shrink-0">
        <div class="col"></div>
      </div>
      <div class="row photo-grid-scroll flex-grow-1 overflow-auto">
        <div class="col-lg-4 col-md-12">
          <photo-card
            src="../assets/20241002_130835.jpg"
            description="Reid State Park."
            location="Georgetown, ME"
            date="September 2024"
          ></photo-card>
          <photo-card
            src="../assets/20240929_150502.jpg"
            description="Labrador Pond, off Labrador Pond Road."
            location="Sumner, ME"
            date="September 2024"
          ></photo-card>
          <photo-card
            src="../assets/20240714_174943.jpg"
            description="West Quoddy Head Lighthouse. Considered the eastermost point of the contiguous USA."
            location="Lubec, ME"
            date="July 2024"
          ></photo-card>
          <photo-card
            src="../assets/20230809_152227.jpg"
            description="
              One of the peaks hiking in Camden Hills State Park.
              <br><br>
              Overlooking Penobscot Bay.
            "
            location="Lincolnville, ME"
            date="August 2023"
          ></photo-card>
        </div>
        <div class="col-lg-4 col-md-12">
          <photo-card
            src="../assets/20220706_141751.jpg"
            description="S'huckins Lobstah. One of my favorite places to eat."
            location="Baileyille, ME"
            date="July 2022"
          ></photo-card>
          <photo-card
            src="../assets/20260301_095959.jpg"
            description="Portland Head Light during a snowy, windy day."
            location="Cape Elizabeth, ME"
            date="March 2026"
          ></photo-card>
          <photo-card
            src="../assets/20230805_193205.jpg"
            description="
                Yes, these are all names of towns in Maine. Right off the intersection of Crooked River Causeway and
                Valley Road."
            location="Bethel, ME"
            date="August 2023"
          ></photo-card>
        </div>
        <div class="col-lg-4 col-md-12">
          <photo-card
            src="../assets/20251018_125855.jpg"
            description="China Lake, off my inlaws camp."
            location="China, ME"
            date="October 2025"
          ></photo-card>
          <photo-card
            src="../assets/20220706_100014.jpg"
            description="
                Stephen King's former house off Broadway Avenue. The house now acts a musuem dedicated to his work.
                <br /><br />
                Unfortunately, you cannot tour the inside. You can only view the house from the outside.
            "
            location="Bangor, ME"
            date="July 2022"
          ></photo-card>
          <photo-card
            class="mb-4"
            src="../assets/20220706_123554~2[1].jpg"
            description="Crawford Lake, off my wife's grandmother's camp."
            location="Crawford, ME"
            date="July 2022"
          >
          </photo-card>
        </div>
      </div>
    </div>
    <script src="../custom-elements/theme-toggle.js"></script>
  </body>
</html>
